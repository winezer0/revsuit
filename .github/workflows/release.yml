on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'

name: Build
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-linux:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: install nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: configure npm registry
        run: npm config set registry https://registry.npmmirror.com

      - name: clean npm cache
        run: npm cache clean --force

      - name: build frontend
        run: |
          cd frontend
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
          npm run build

      - name: get the version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(echo $GITHUB_REF | cut -d / -f 3)" >> $GITHUB_OUTPUT
          fi

      # 创建输出目录
      - name: create bin directory
        run: mkdir -p bin

      # 编译 + 自动压缩成 tar.gz
      - name: compile & compress all binaries
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          
          # Linux amd64
          CGO_ENABLED=0 GOARCH=amd64 go build -ldflags="-s -w -X github.com/winezer0/revsuit/pkg/server.VERSION=$VERSION" -tags netgo -trimpath -o bin/revsuit_linux_amd64 ./cmd/revsuit/main.go
          tar -zcvf bin/revsuit_linux_amd64.$VERSION.tar.gz -C bin revsuit_linux_amd64
          
          # Linux arm64
          CGO_ENABLED=0 GOARCH=arm64 go build -ldflags="-s -w -X github.com/winezer0/revsuit/pkg/server.VERSION=$VERSION" -tags netgo -trimpath -o bin/revsuit_linux_arm64 ./cmd/revsuit/main.go
          tar -zcvf bin/revsuit_linux_arm64.$VERSION.tar.gz -C bin revsuit_linux_arm64
          
          # Darwin amd64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X github.com/winezer0/revsuit/pkg/server.VERSION=$VERSION" -trimpath -o bin/revsuit_darwin_amd64 ./cmd/revsuit/main.go
          tar -zcvf bin/revsuit_darwin_amd64.$VERSION.tar.gz -C bin revsuit_darwin_amd64
          
          # Darwin arm64
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X github.com/winezer0/revsuit/pkg/server.VERSION=$VERSION" -trimpath -o bin/revsuit_darwin_arm64 ./cmd/revsuit/main.go
          tar -zcvf bin/revsuit_darwin_arm64.$VERSION.tar.gz -C bin revsuit_darwin_arm64
          
          # Windows amd64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X github.com/winezer0/revsuit/pkg/server.VERSION=$VERSION" -trimpath -o bin/revsuit_windows_amd64.exe ./cmd/revsuit/main.go
          tar -zcvf bin/revsuit_windows_amd64.$VERSION.tar.gz -C bin revsuit_windows_amd64.exe

      # 只上传压缩包
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.tar.gz
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false